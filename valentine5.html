<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Demande de rendez-vous 💕</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: #7a1f4d;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      overflow: hidden;
      background: linear-gradient(135deg, #ffe6f2 0%, #ffd6e8 45%, #ffc2da 100%);
      position: relative;
    }

    body::before,
    body::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      filter: blur(50px);
      opacity: 0.45;
      animation: drift 8s ease-in-out infinite alternate;
      pointer-events: none;
    }

    body::before {
      width: 260px;
      height: 260px;
      background: rgba(255, 107, 157, 0.35);
      top: -60px;
      left: -50px;
    }

    body::after {
      width: 320px;
      height: 320px;
      background: rgba(255, 186, 212, 0.35);
      bottom: -100px;
      right: -60px;
      animation-duration: 10s;
    }

    .petals {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .petal {
      position: absolute;
      top: -10vh;
      width: 14px;
      height: 18px;
      background: radial-gradient(circle at 30% 30%, #ff9ec7, #ff5d95 70%);
      border-radius: 80% 0 55% 50%;
      opacity: 0.8;
      animation: fall linear infinite;
      filter: drop-shadow(0 2px 3px rgba(255, 93, 149, 0.25));
    }

    .petal::before {
      content: "";
      position: absolute;
      inset: 0;
      background: inherit;
      transform: rotate(45deg);
      border-radius: inherit;
    }

    .card {
      position: relative;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.75);
      border-radius: 28px;
      padding: 32px 28px;
      width: min(100%, 500px);
      box-shadow: 0 25px 60px rgba(122, 31, 77, 0.22);
      text-align: center;
      animation: fadeIn 0.8s ease;
      backdrop-filter: blur(14px);
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, rgba(255, 255, 255, 0.15), transparent 35%, rgba(255, 182, 212, 0.18));
      pointer-events: none;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 12px;
      color: #d81b60;
      text-shadow: 0 1px 2px rgba(216, 27, 96, 0.16);
    }

    p {
      line-height: 1.7;
      margin-bottom: 20px;
      color: #8a4464;
      font-size: 1rem;
    }

    .heart {
      font-size: 2.3rem;
      animation: pulse 1.2s infinite alternate;
      margin-bottom: 10px;
      text-shadow: 0 0 16px rgba(255, 77, 141, 0.22);
    }

    .floating-hearts {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .floating-hearts span {
      position: absolute;
      font-size: 1.2rem;
      opacity: 0.45;
      animation: floatHeart 5s ease-in-out infinite;
    }

    .floating-hearts span:nth-child(1) {
      left: 8%;
      top: 12%;
      animation-delay: 0s;
    }

    .floating-hearts span:nth-child(2) {
      right: 10%;
      top: 20%;
      animation-delay: 1.2s;
    }

    .floating-hearts span:nth-child(3) {
      left: 14%;
      bottom: 10%;
      animation-delay: 2s;
    }

    .floating-hearts span:nth-child(4) {
      right: 16%;
      bottom: 16%;
      animation-delay: 2.4s;
    }

    .buttons {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 90px;
      margin-top: 20px;
      padding: 10px 0;
    }

    button {
      padding: 12px 22px;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      font-weight: bold;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
      box-shadow: 0 8px 20px rgba(216, 27, 96, 0.16);
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 12px 24px rgba(216, 27, 96, 0.22);
    }

    .btn-primary {
      background: linear-gradient(135deg, #ff4d8d, #ff66a1);
      color: white;
      z-index: 2;
    }

    .btn-secondary {
      background: #fce6ee;
      color: #9b2c5c;
      position: absolute;
      left: calc(50% + 80px);
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 1;
      transition: left 0.2s ease, top 0.2s ease, transform 0.2s ease;
    }

    .form-section {
      display: none;
      text-align: left;
      margin-top: 20px;
      animation: slideUp 0.35s ease;
    }

    .form-section.show {
      display: block;
    }

    label {
      display: block;
      margin-top: 12px;
      margin-bottom: 6px;
      font-weight: 600;
      color: #7a1f4d;
    }

    select,
    input[type="date"] {
      width: 100%;
      padding: 12px;
      border: 1px solid #f2b8cc;
      border-radius: 12px;
      font-size: 1rem;
      outline: none;
      background: #fffafc;
      color: #7a1f4d;
    }

    .submit-btn {
      margin-top: 18px;
      width: 100%;
      background: linear-gradient(135deg, #ff4d8d, #ff6fae);
      color: white;
    }

    .message {
      margin-top: 20px;
      padding: 14px;
      border-radius: 12px;
      background: #fff0f6;
      color: #b23b68;
      display: none;
      font-weight: 600;
      box-shadow: inset 0 0 0 1px rgba(216, 27, 96, 0.08);
      animation: fadeIn 0.25s ease;
    }

    .message.show {
      display: block;
    }

    .petals {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .petal {
      position: absolute;
      top: -10vh;
      width: 14px;
      height: 18px;
      background: radial-gradient(circle at 30% 30%, #ff9ec7, #ff5d95 70%);
      border-radius: 80% 0 55% 50%;
      opacity: 0.8;
      animation: fall linear infinite;
      filter: drop-shadow(0 2px 3px rgba(255, 93, 149, 0.25));
    }

    .petal::before {
      content: "";
      position: absolute;
      inset: 0;
      background: inherit;
      transform: rotate(45deg);
      border-radius: inherit;
    }

    @keyframes pulse {
      from {
        transform: scale(1);
      }

      to {
        transform: scale(1.15);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes floatHeart {

      0%,
      100% {
        transform: translateY(0) rotate(0deg);
        opacity: 0.3;
      }

      50% {
        transform: translateY(-10px) rotate(10deg);
        opacity: 0.7;
      }
    }

    @keyframes drift {
      from {
        transform: translate3d(0, 0, 0);
      }

      to {
        transform: translate3d(20px, 20px, 0);
      }
    }

    @keyframes fall {
      0% {
        transform: translate3d(0, 0, 0) rotate(0deg);
        opacity: 0;
      }

      10% {
        opacity: 0.9;
      }

      100% {
        transform: translate3d(var(--drift-x), 110vh, 0) rotate(720deg);
        opacity: 0.2;
      }
    }
  </style>
</head>

<body>
  <div class="petals" aria-hidden="true"></div>
  <div class="card">
    <div class="floating-hearts" aria-hidden="true">
      <span>💗</span>
      <span>💞</span>
      <span>🥰</span>
      <span>💌</span>
    </div>
    <div class="heart">💖</div>
    <h1>Veux-tu sortir avec moi ?</h1>
    <p>Je voulais te faire une surprise... Choisis ce que tu préfères et sélectionne une date, puis envoie ta réponse
      directement par e-mail.</p>

    <div class="buttons" id="buttons">
      <button class="btn-primary" id="yesBtn" type="button" onclick="showForm()">Oui, bien sûr 💌</button>
      <button class="btn-secondary" id="noBtn" type="button">Non 😅</button>
    </div>

    <form id="dateForm" class="form-section"
      action="https://script.google.com/macros/s/AKfycbz0KtMcr1sg9JwgxdNx5QcoQKm-OxNJRZdPrZn0uBCfMJU2lvKIn4roCkC7pmNPxh-x5A/exec"
      method="POST">
      <input type="hidden" name="_subject" value="Nouvelle réponse de rendez-vous" />
      <input type="hidden" name="_captcha" value="false" />
      <input type="hidden" name="_next" value="./valentine5.html?submitted=true" />

      <label for="activity">Choisis ton idée</label>
      <select id="activity" name="activity" required>
        <option value="Un dîner romantique">Un dîner romantique</option>
        <option value="Un cinéma">Un cinéma</option>
        <option value="Une promenade au coucher du soleil">Une promenade au coucher du soleil</option>
        <option value="Un pique-nique">Un pique-nique</option>
        <option value="Un café cozy">Un café cozy</option>
      </select>

      <label for="date">Sélectionne une date</label>
      <input type="date" id="date" name="date" required />

      <button class="submit-btn" type="submit">Envoyer ma réponse</button>
    </form>

    <div class="message" id="message"></div>
  </div>

  <script>
    const noButton = document.getElementById('noBtn');
    const buttonsContainer = document.getElementById('buttons');

    noButton.addEventListener('mouseenter', moveNoButton);
    noButton.addEventListener('mouseover', moveNoButton);
    noButton.addEventListener('click', (event) => {
      event.preventDefault();
      moveNoButton();
      showMessage('Essaie encore 😘');
    });

    function moveNoButton() {
      const containerRect = buttonsContainer.getBoundingClientRect();
      const buttonRect = noButton.getBoundingClientRect();
      const maxLeft = Math.max(0, containerRect.width - buttonRect.width - 20);
      const maxTop = Math.max(0, containerRect.height - buttonRect.height - 20);
      const left = Math.random() * maxLeft;
      const top = Math.random() * maxTop;

      noButton.style.left = `${left}px`;
      noButton.style.top = `${top}px`;
      noButton.style.transform = 'translate(0, 0)';
    }

    function showForm() {
      const form = document.getElementById('dateForm');
      form.classList.add('show');
      buttonsContainer.style.display = 'none';
      document.querySelector('.card').classList.add('form-visible');
    }

    function showMessage(text) {
      const message = document.getElementById('message');
      message.textContent = text;
      message.classList.add('show');
    }

    function checkSubmitted() {
      const params = new URLSearchParams(window.location.search);
      if (params.get('submitted') === 'true') {
        showMessage('Merci ! Ta réponse a bien été envoyée.');
      }
    }

    document.getElementById('dateForm').addEventListener('submit', function (event) {
      const date = document.getElementById('date').value;
      if (!date) {
        event.preventDefault();
        showMessage('Choisis une date s’il te plaît 💕');
      }
    });

    function createPetals() {
      const petalsContainer = document.querySelector('.petals');
      const petalCount = 28;

      for (let i = 0; i < petalCount; i += 1) {
        const petal = document.createElement('span');
        petal.className = 'petal';
        petal.style.left = `${Math.random() * 100}%`;
        petal.style.setProperty('--drift-x', `${(Math.random() - 0.5) * 180}px`);
        petal.style.animationDuration = `${8 + Math.random() * 7}s`;
        petal.style.animationDelay = `${Math.random() * 5}s`;
        petal.style.opacity = `${0.3 + Math.random() * 0.7}`;
        petal.style.transform = `scale(${0.7 + Math.random() * 0.6})`;
        petalsContainer.appendChild(petal);
      }
    }

    createPetals();
    checkSubmitted();
  </script>
</body>

</html>
